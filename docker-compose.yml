# Production stack: one-command bring-up of db -> backend -> frontend in
# health-gated order. `docker compose up --build` makes the app reachable at
# http://localhost:8080 with no .env file required (env is set inline below).
#
# Note: this is the PRODUCTION stack. The ephemeral integration-test DB lives in
# docker-compose.test.yml and is intentionally separate.
services:
  db:
    image: postgres:18.4
    restart: unless-stopped
    environment:
      POSTGRES_USER: todo
      POSTGRES_PASSWORD: todo
      POSTGRES_DB: todo
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U todo -d todo']
      interval: 5s
      timeout: 3s
      retries: 10
    # No `ports:` — the DB is reachable only on the private compose network.

  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 8080
      # Host is the `db` service name on the compose network, not localhost.
      DATABASE_URL: postgres://todo:todo@db:5432/todo
      # The browser's origin in this stack is http://localhost:8080 (same-origin
      # via nginx, so CORS isn't actually exercised — set the correct value anyway).
      CORS_ORIGIN: http://localhost:8080
    depends_on:
      db:
        condition: service_healthy
    # Uses Node's global fetch (Node 18+) so no curl/wget needed in the slim image.
    # /api/health runs SELECT 1, so a 200 means the DB is up too (readiness).
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'node -e "fetch(''http://localhost:8080/api/health'').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"',
        ]
      interval: 10s
      timeout: 3s
      retries: 5
      # Grace window for cold start (migrations + listen) so legitimate boot
      # time isn't charged against the retry budget — avoids flaky `--wait`.
      start_period: 30s
    # No `ports:` — only reachable via the nginx reverse proxy in `frontend`.

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - '8080:80'
    depends_on:
      backend:
        condition: service_healthy
    # busybox wget ships in nginx:stable-alpine, so `docker compose up --wait`
    # also gates on nginx serving the SPA.
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost/ >/dev/null 2>&1 || exit 1']
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

volumes:
  db-data:
