# Ephemeral test database for integration / E2E tests.
# Provides a fresh Postgres that CI and local test runs bring up on demand.
# Later stories add fresh-migrate + truncate-between-tests behavior; here it
# just needs to come up and be reachable.
services:
  db:
    image: postgres:18.4
    environment:
      POSTGRES_USER: todo
      POSTGRES_PASSWORD: todo
      POSTGRES_DB: todo
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U todo -d todo']
      interval: 5s
      timeout: 5s
      retries: 10
    tmpfs:
      - /var/lib/postgresql/data
