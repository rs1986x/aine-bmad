name: CI

on:
  push:
  pull_request:

# Avoid duplicate/redundant runs: collapse a branch push and its open PR into
# one concurrency group. PR events expose `github.head_ref` (the source branch);
# push events fall back to `github.ref`, so both map to the same group key.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

# Node 24 LTS — current LTS, comfortably above the toolchain's minimums
# (Vite / Vitest / Playwright). Pin here so all jobs share one version.
env:
  NODE_VERSION: '24'

jobs:
  frontend:
    name: Frontend (lint + typecheck + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test

  backend:
    name: Backend (lint + typecheck + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - name: Start ephemeral test Postgres
        working-directory: .
        run: |
          docker compose -f docker-compose.test.yml up -d --wait
          docker compose -f docker-compose.test.yml ps
      - name: Run tests (integration tests hit the ephemeral Postgres)
        env:
          NODE_ENV: test
          PORT: '8080'
          DATABASE_URL: postgres://todo:todo@localhost:5432/todo
          CORS_ORIGIN: http://localhost:5173
        run: npm test
      - name: Stop ephemeral test Postgres
        if: always()
        working-directory: .
        run: docker compose -f docker-compose.test.yml down -v

  e2e:
    name: E2E (Playwright + ephemeral Postgres)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: e2e
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: e2e/package-lock.json
      - name: Start ephemeral test Postgres
        working-directory: .
        run: |
          docker compose -f docker-compose.test.yml up -d --wait
          docker compose -f docker-compose.test.yml ps
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - run: npm test
      - name: Stop ephemeral test Postgres
        if: always()
        working-directory: .
        run: docker compose -f docker-compose.test.yml down -v
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 7

  compose-smoke:
    name: Compose smoke (one-command bring-up)
    runs-on: ubuntu-latest
    # Independent of the frontend/backend/e2e jobs: this proves the PRODUCTION
    # docker-compose.yml stack builds, comes up health-gated, serves the SPA, and
    # reverse-proxies /api through nginx. It must fail the build on any failure.
    steps:
      - uses: actions/checkout@v4
      - name: Build images and bring the stack up health-gated
        # Bounded wait so a container stuck `starting`/unhealthy fails fast
        # instead of blocking until the GitHub job timeout.
        run: docker compose up -d --build --wait --wait-timeout 180
      - name: Poll /api/health until 200 (proxied through nginx)
        run: |
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:8080/api/health > /dev/null; then
              echo "backend healthy via proxy"
              exit 0
            fi
            echo "waiting for /api/health ($i)..."
            sleep 2
          done
          echo "timed out waiting for /api/health"
          exit 1
      - name: Assert SPA is served at /
        run: curl -fsS http://localhost:8080/ > /dev/null
      - name: Assert proxied /api/health returns ok + db up
        run: |
          body=$(curl -fsS http://localhost:8080/api/health)
          echo "Response: $body"
          echo "$body" | grep -q '"status":"ok"'
          echo "$body" | grep -q '"db":"up"'
      - name: Assert proxied /api/todos returns 200 + empty list
        # Proves the empty data path the EmptyState renders works end-to-end
        # through nginx → backend → fresh db. Story 3.1 owns the browser E2E.
        run: |
          body=$(curl -fsS http://localhost:8080/api/todos)
          echo "Response: $body"
          echo "$body" | grep -qx '\[\]'
      - name: Dump compose logs on failure
        if: failure()
        run: docker compose logs
      - name: Tear down the stack
        if: always()
        run: docker compose down -v
